<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaktriIQ — Safety Officer Verification</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap');

    :root {
      --color-bg: #FFFDF5;
      --color-ink: #1E2328;
      --color-slate: #2A2E34;
      --color-surface: #F9F6EE;
      --color-subtle-light: #FFF4BD;
      --color-border: #E2E8F0;
      --color-border-dark: #3B3F46;
      --color-accent: #FEE715;
      --color-muted: #64748B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geist', -apple-system, system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 20%, rgba(254, 231, 21, 0.25), transparent 70%),
        radial-gradient(ellipse 500px 350px at 80% 80%, rgba(255, 244, 189, 0.4), transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
    }

    .login-card {
      background: #FFFFFF;
      border: 1px solid var(--color-border-dark);
      border-radius: 24px;
      padding: 36px 28px;
      box-shadow:
        0 20px 40px -15px rgba(30, 35, 40, 0.08),
        0 0 0 1px rgba(30, 35, 40, 0.04);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--color-subtle-light);
      border: 1px solid rgba(254, 231, 21, 0.6);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      color: #92400E;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .logo h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--color-ink);
    }

    .logo h1 .yellow-accent {
      background: #FEE715;
      padding: 2px 6px;
      border-radius: 6px;
      color: #101820;
    }

    .logo p {
      color: var(--color-muted);
      font-size: 13px;
      margin-top: 6px;
      font-weight: 500;
    }

    .step { display: none; }
    .step.active { display: block; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--color-ink);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: #FAFAFA;
      border: 1.5px solid var(--color-border-dark);
      border-radius: 14px;
      padding: 0 16px;
      transition: all 0.2s ease;
    }

    .input-group:focus-within {
      border-color: var(--color-ink);
      background: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(30, 35, 40, 0.08);
    }

    .input-prefix {
      color: var(--color-ink);
      font-size: 15px;
      font-weight: 700;
      margin-right: 10px;
      user-select: none;
    }

    .input-group input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--color-ink);
      font-size: 16px;
      font-weight: 600;
      padding: 14px 0;
      font-family: inherit;
    }

    .input-group input::placeholder { color: #A1A1AA; font-weight: 400; }

    .otp-inputs {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .otp-inputs input {
      width: 44px;
      height: 52px;
      background: #FAFAFA;
      border: 1.5px solid var(--color-border-dark);
      border-radius: 12px;
      color: var(--color-ink);
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      outline: none;
      font-family: 'Geist', monospace;
      transition: all 0.2s ease;
    }

    .otp-inputs input:focus {
      border-color: var(--color-ink);
      background: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(30, 35, 40, 0.08);
    }

    .push-btn {
      width: 100%;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 14px 26px;
      border-radius: 14px;
      background: var(--color-ink);
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 4px 0 #0D1012;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.2s ease;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 18px;
      font-family: inherit;
    }

    .push-btn:hover:not(:disabled) { background: var(--color-slate); }
    .push-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 #0D1012; }
    .push-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
    .push-btn.loading { color: transparent; }
    .push-btn.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2.5px solid #FFFFFF;
      border-top-color: transparent;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .error-msg {
      background: #FEF2F2;
      border: 1px solid #FCA5A5;
      color: #991B1B;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12.5px;
      font-weight: 500;
      margin-top: 14px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .change-phone {
      display: inline-block;
      color: var(--color-ink);
      font-size: 12.5px;
      font-weight: 600;
      margin-top: 16px;
      cursor: pointer;
      text-decoration: underline;
    }

    .phone-display {
      color: var(--color-muted);
      font-size: 13.5px;
      margin-bottom: 18px;
      text-align: center;
    }

    .phone-display strong { color: var(--color-ink); font-weight: 700; }

    .recaptcha-wrapper {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    .success-container { text-align: center; padding: 16px 0; }
    .success-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #DCFCE7;
      color: #166534;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 26px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-badge">⚡ Safety Workstation Auth</div>
        <h1>Faktri<span class="yellow-accent">IQ</span></h1>
        <p>Enter your phone number to authorize desktop session</p>
      </div>

      <!-- Step 1: Phone -->
      <div id="step-phone" class="step active">
        <label for="phone-input">Mobile Number</label>
        <div class="input-group">
          <span class="input-prefix">+91</span>
          <input id="phone-input" type="tel" maxlength="10" placeholder="10-digit mobile number" inputmode="numeric" />
        </div>
        <div class="recaptcha-wrapper">
          <div id="recaptcha-container"></div>
        </div>
        <button id="btn-send-otp" class="push-btn" disabled>Send Verification SMS</button>
        <div id="error-phone" class="error-msg"></div>
      </div>

      <!-- Step 2: OTP -->
      <div id="step-otp" class="step">
        <p class="phone-display">Verification code sent to <strong id="display-phone"></strong></p>
        <label>6-Digit Code</label>
        <div class="otp-inputs" id="otp-inputs">
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
        </div>
        <button id="btn-verify-otp" class="push-btn" disabled>Verify &amp; Sign In</button>
        <div id="error-otp" class="error-msg"></div>
        <div style="text-align: center;">
          <a class="change-phone" id="btn-change-phone">← Change Phone Number</a>
        </div>
      </div>

      <!-- Step 3: Success -->
      <div id="step-success" class="step">
        <div class="success-container">
          <div class="success-icon">✓</div>
          <h3 style="font-size: 18px; font-weight: 800;">Authorized!</h3>
          <p style="color: var(--color-muted); font-size: 13px; margin-top: 4px;">Redirecting authentication token to FaktriIQ desktop…</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-auth-compat.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const callbackPort = urlParams.get('port') || '8585';

    // Retrieve API key dynamically from URL query params or fallback
    const defaultApiKey = atob("QUl6YVN5QXVZSXNKcFJSVlVqak5qb3paajNSaGxhMUw2UjlaZ0xN");

    const firebaseConfig = {
      apiKey: urlParams.get('apiKey') || defaultApiKey,
      authDomain: urlParams.get('authDomain') || "faktri-iq.firebaseapp.com",
      projectId: urlParams.get('projectId') || "faktri-iq",
      storageBucket: urlParams.get('storageBucket') || "faktri-iq.firebasestorage.app",
      messagingSenderId: urlParams.get('messagingSenderId') || "680070607494",
      appId: urlParams.get('appId') || "1:680070607494:web:4cb123d7641ffdfbe95707",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    auth.useDeviceLanguage();

    const phoneInput = document.getElementById('phone-input');
    const btnSendOtp = document.getElementById('btn-send-otp');
    const btnVerifyOtp = document.getElementById('btn-verify-otp');
    const btnChangePhone = document.getElementById('btn-change-phone');
    const errorPhone = document.getElementById('error-phone');
    const errorOtp = document.getElementById('error-otp');
    const displayPhone = document.getElementById('display-phone');
    const otpInputs = document.querySelectorAll('#otp-inputs input');

    let confirmationResult = null;
    let recaptchaVerifier = null;

    function showStep(id) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError(el) { el.classList.remove('visible'); }

    function setLoading(btn, loading) {
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    // Render reCAPTCHA v2 (visible fallback to avoid Enterprise billing checks)
    function renderRecaptcha() {
      if (recaptchaVerifier) return;
      try {
        recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
          'size': 'normal',
          'callback': (response) => {
            hideError(errorPhone);
          },
          'expired-callback': () => {
            showError(errorPhone, 'reCAPTCHA expired. Check the box again.');
          }
        });
        recaptchaVerifier.render();
      } catch (e) {
        console.error('reCAPTCHA init error:', e);
      }
    }

    // Render reCAPTCHA immediately on load
    window.addEventListener('DOMContentLoaded', () => {
      renderRecaptcha();
    });

    phoneInput.addEventListener('input', () => {
      const val = phoneInput.value.replace(/\D/g, '');
      phoneInput.value = val;
      btnSendOtp.disabled = val.length !== 10;
      hideError(errorPhone);
    });

    btnSendOtp.addEventListener('click', async () => {
      const phone = phoneInput.value.trim();
      if (!/^[6-9]\d{9}$/.test(phone)) {
        showError(errorPhone, 'Enter a valid 10-digit Indian mobile number.');
        return;
      }

      hideError(errorPhone);
      setLoading(btnSendOtp, true);

      try {
        if (!recaptchaVerifier) renderRecaptcha();

        confirmationResult = await auth.signInWithPhoneNumber('+91' + phone, recaptchaVerifier);
        displayPhone.textContent = '+91 ' + phone;
        showStep('step-otp');
        otpInputs[0].focus();
      } catch (err) {
        console.error('SMS Error:', err);
        let msg = err.message || 'Could not send SMS.';
        if (err.code === 'auth/billing-not-enabled') {
          msg = 'Please use a registered Firebase test phone number, or check billing status.';
        }
        showError(errorPhone, msg);
        if (grecaptcha) grecaptcha.reset();
      } finally {
        setLoading(btnSendOtp, false);
      }
    });

    otpInputs.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '');
        if (input.value && i < otpInputs.length - 1) otpInputs[i + 1].focus();
        const otp = Array.from(otpInputs).map(inp => inp.value).join('');
        btnVerifyOtp.disabled = otp.length !== 6;
        hideError(errorOtp);
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) otpInputs[i - 1].focus();
      });
    });

    btnVerifyOtp.addEventListener('click', async () => {
      const otp = Array.from(otpInputs).map(inp => inp.value).join('');
      if (otp.length !== 6 || !confirmationResult) return;

      hideError(errorOtp);
      setLoading(btnVerifyOtp, true);

      try {
        const result = await confirmationResult.confirm(otp);
        const idToken = await result.user.getIdToken();

        showStep('step-success');

        setTimeout(() => {
          window.location.href = 'http://127.0.0.1:' + callbackPort + '/auth-callback?token=' + encodeURIComponent(idToken);
        }, 600);
      } catch (err) {
        console.error('Verify error:', err);
        showError(errorOtp, 'Invalid verification code.');
      } finally {
        setLoading(btnVerifyOtp, false);
      }
    });

    btnChangePhone.addEventListener('click', () => {
      showStep('step-phone');
      confirmationResult = null;
      if (grecaptcha) grecaptcha.reset();
      otpInputs.forEach(inp => { inp.value = ''; });
      btnVerifyOtp.disabled = true;
      hideError(errorOtp);
    });
  </script>
</body>
</html>
